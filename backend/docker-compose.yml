services:
  db:
    image: postgres:15-alpine
    container_name: korsana-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: korsana-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot: applies every embedded migration via cmd/migrate, then exits.
  # Idempotent — safe to re-run after the first bootstrap.
  migrate:
    build:
      context: .
      target: migrate
    container_name: korsana-migrate
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # API server. Waits for migrations to finish so first request never hits
  # an unmigrated schema.
  api:
    build:
      context: .
      target: server
    container_name: korsana-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres?sslmode=disable
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: http://localhost:5174
      FRONTEND_URL: http://localhost:5174
      ENVIRONMENT: development
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
